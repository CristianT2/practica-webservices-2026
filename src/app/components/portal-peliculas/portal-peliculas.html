<div class="container py-5">
    <h2 class="text-primary fw-bold pb-3">Peliculas Destacadas</h2>
    @if (cargando) {
    <div class="text-center my-5">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-2 text-secondary">Cargando catálogo...</p>
    </div>
    } @else {
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
        @for (pelicula of peliculas; track pelicula.id) {
        <div class="col">
            <div class="card h-100 shadow-sm border-0 bg-dark text-white card-pelicula">
                <img [src]="pelicula.image" class="card-img-top object-fit-cover" alt="{{ pelicula.title }}"
                    style="height: 350px;">

                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0 text-truncate" style="max-width: 80%;">{{ pelicula.title }}</h5>
                        <span class="badge bg-warning text-dark">{{ pelicula.year }}</span>
                    </div>

                    <div class="d-flex align-items-center text-warning small mb-3">
                        <i class="bi bi-star-fill me-1"></i>
                        <span class="fw-bold">{{ pelicula.rating || 'N/A' }}</span>
                        <span class="text-muted ms-1" style="font-size: 0.75rem;">/10</span>
                    </div>

                    <p class="card-text small flex-grow-1">
                        {{ pelicula.description | slice:0:120 }}...
                    </p>

                    <div class="mt-2">
                        @for (g of pelicula.genre; track g) {
                        <span class="badge bg-secondary me-1 b-sm">{{ g }}</span>
                        }
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
    }
</div>
